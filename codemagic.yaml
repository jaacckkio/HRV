workflows:
  android-debug-apk:
    name: Android Debug APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    # Release APK would need a keystore + signing config — debug is fine for
    # sideload testing (USB install or file transfer to device).
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build debug APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
